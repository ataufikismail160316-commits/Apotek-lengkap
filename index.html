<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taufik Pharma | Katalog Digital Premium</title>
    
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .product-card { border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-active { display: flex !important; }
    </style>
</head>
<body class="text-slate-900 pb-40">

    <nav class="glass-nav sticky top-0 z-50 px-5 py-4 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-house-medical text-lg"></i>
            </div>
            <div>
                <h1 class="text-base font-extrabold leading-none tracking-tight">TAUFIK<span class="text-emerald-600 uppercase">Pharma</span></h1>
                <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase flex items-center gap-1">
                    <i class="fa-solid fa-circle-check text-emerald-500"></i> Terverifikasi
                </p>
            </div>
        </div>
        <button onclick="toggleCartModal()" class="relative p-2 active:scale-90 transition-transform">
            <i class="fa-solid fa-cart-shopping text-slate-400 text-2xl"></i>
            <span id="cart-count-top" class="absolute top-0 right-0 bg-rose-500 text-white text-[9px] font-bold h-4 w-4 rounded-full flex items-center justify-center border border-white hidden">0</span>
        </button>
    </nav>

    <main id="view-katalog" class="max-w-md mx-auto">
        <div class="p-5">
            <input type="text" id="searchInput" onkeyup="cariBarang()" placeholder="Cari obat atau vitamin..." 
                class="w-full bg-white border border-slate-200 py-4 px-6 rounded-2xl text-sm focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none shadow-sm transition-all">
        </div>

        <div class="bg-white rounded-t-[40px] px-5 pt-8 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] min-h-[500px]">
            <h2 class="text-sm font-extrabold text-slate-800 uppercase tracking-tight mb-6 px-2">Rekomendasi Produk</h2>
            <div id="produk-list" class="grid grid-cols-2 gap-4">
                <div class="col-span-2 text-center py-20"><i class="fa-solid fa-circle-notch animate-spin text-3xl text-emerald-500"></i></div>
            </div>
        </div>
    </main>

    <main id="view-transaksi" class="max-w-md mx-auto hidden p-10 text-center">
        <i class="fa-solid fa-receipt text-6xl text-slate-200 mb-4"></i>
        <h2 class="font-bold text-slate-800">Belum ada transaksi</h2>
        <p class="text-xs text-slate-400 mt-2">Pesanan yang kamu kirim via WhatsApp akan tercatat otomatis di sini nantinya.</p>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-[100] hidden items-end sm:items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-[32px] sm:rounded-[32px] overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-bold text-lg">Keranjang Belanja</h3>
                <button onclick="toggleCartModal()" class="text-slate-400 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="cart-items-list" class="p-6 overflow-y-auto space-y-4 flex-1">
                </div>
            <div class="p-6 bg-slate-50 border-t border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-slate-500 text-sm font-bold">Total Pembayaran</span>
                    <span id="modal-total-price" class="text-xl font-extrabold text-emerald-700 text-right">Rp 0</span>
                </div>
                <button onclick="kirimWA()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-200 active:scale-95 transition-all">
                    KONFIRMASI VIA WHATSAPP <i class="fa-brands fa-whatsapp ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="checkout-panel" class="fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-emerald-600 rounded-2xl p-4 shadow-2xl hidden z-40">
        <div class="flex justify-between items-center text-white">
            <div class="flex flex-col">
                <span id="items-info" class="text-[10px] font-bold opacity-80 uppercase tracking-widest">0 Barang</span>
                <span id="panel-total-price" class="text-lg font-extrabold">Rp 0</span>
            </div>
            <button onclick="toggleCartModal()" class="bg-white text-emerald-700 px-4 py-2 rounded-xl text-xs font-bold shadow-sm active:scale-95">
                DETAIL <i class="fa-solid fa-chevron-right ml-1"></i>
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-slate-900/95 backdrop-blur-xl rounded-[2rem] p-2.5 flex items-center justify-around shadow-2xl z-40">
        <button onclick="switchTab('katalog')" id="nav-katalog" class="h-11 w-11 rounded-2xl bg-emerald-500 text-white flex items-center justify-center transition-all">
            <i class="fa-solid fa-house-chimney text-sm"></i>
        </button>
        <button onclick="switchTab('transaksi')" id="nav-transaksi" class="h-11 w-11 rounded-2xl text-slate-500 flex items-center justify-center transition-all">
            <i class="fa-solid fa-receipt text-sm"></i>
        </button>
        <button onclick="switchTab('user')" id="nav-user" class="h-11 w-11 rounded-2xl text-slate-500 flex items-center justify-center transition-all">
            <i class="fa-solid fa-user-gear text-sm"></i>
        </button>
    </div>

    <script>
        const URL_PROJECT = 'https://koyrvhtqsqbinagynfyf.supabase.co';
        const KEY_PROJECT = 'sb_publishable_7UyNt1p50WprNz-K-_bFng_cymPxs5M';
        const sbClient = supabase.createClient(URL_PROJECT, KEY_PROJECT);
        
        let semuaProduk = [];
        let keranjang = {}; 

        async function ambilData() {
            const { data, error } = await sbClient.from('prodak').select('*').order('nama_barang', { ascending: true });
            if (error) return;
            semuaProduk = data;
            tampilkanData(semuaProduk);
        }

        function tampilkanData(list) {
            let html = '';
            list.forEach(item => {
                html += `
                <div class="product-card bg-white rounded-3xl p-4 flex flex-col justify-between shadow-sm">
                    <div>
                        <div class="w-full aspect-square bg-slate-50 rounded-2xl mb-3 flex items-center justify-center text-emerald-600/20"><i class="fa-solid fa-pills text-4xl"></i></div>
                        <h3 class="text-[11px] font-extrabold text-slate-800 leading-tight h-7 overflow-hidden">${item.nama_barang}</h3>
                        <p class="text-[9px] font-bold text-slate-400 mt-2 uppercase tracking-tighter">Stok: <span class="${item.stok < 5 ? 'text-rose-500' : 'text-emerald-600'} font-black">${item.stok}</span></p>
                        <p class="text-sm font-extrabold text-emerald-700 mt-1">Rp ${Number(item.harga_eceran).toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="tambahKeKeranjang('${item.nama_barang}', ${item.harga_eceran})" 
                        class="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[10px] font-bold active:scale-90 transition-transform">
                        + KERANJANG
                    </button>
                </div>`;
            });
            document.getElementById('produk-list').innerHTML = html;
        }

        function tambahKeKeranjang(nama, harga) {
            if (keranjang[nama]) {
                keranjang[nama].qty += 1;
            } else {
                keranjang[nama] = { harga: harga, qty: 1 };
            }
            updateCartUI();
        }

        function hapusDariKeranjang(nama) {
            delete keranjang[nama];
            updateCartUI();
        }

        function ubahQty(nama, delta) {
            if (keranjang[nama]) {
                keranjang[nama].qty += delta;
                if (keranjang[nama].qty <= 0) delete keranjang[nama];
                updateCartUI();
            }
        }

        function updateCartUI() {
            let totalItems = 0;
            let totalPrice = 0;
            let modalHtml = '';

            for (let k in keranjang) {
                let subTotal = keranjang[k].harga * keranjang[k].qty;
                totalItems += keranjang[k].qty;
                totalPrice += subTotal;

                modalHtml += `
                <div class="flex items-center justify-between border-b border-slate-50 pb-4">
                    <div class="flex-1 pr-4">
                        <h4 class="text-xs font-bold text-slate-800">${k}</h4>
                        <p class="text-[10px] text-emerald-600 font-bold">Rp ${keranjang[k].harga.toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-100 p-1 rounded-lg">
                        <button onclick="ubahQty('${k}', -1)" class="w-7 h-7 bg-white rounded-md shadow-sm text-xs font-bold">-</button>
                        <span class="text-xs font-bold min-w-[20px] text-center">${keranjang[k].qty}</span>
                        <button onclick="ubahQty('${k}', 1)" class="w-7 h-7 bg-white rounded-md shadow-sm text-xs font-bold">+</button>
                    </div>
                </div>`;
            }

            // Update Labels
            const countLabelTop = document.getElementById('cart-count-top');
            const panel = document.getElementById('checkout-panel');
            
            if (totalItems > 0) {
                countLabelTop.innerText = totalItems;
                countLabelTop.classList.remove('hidden');
                panel.classList.remove('hidden');
                document.getElementById('items-info').innerText = `${totalItems} Barang`;
                document.getElementById('panel-total-price').innerText = `Rp ${totalPrice.toLocaleString('id-ID')}`;
                document.getElementById('modal-total-price').innerText = `Rp ${totalPrice.toLocaleString('id-ID')}`;
                document.getElementById('cart-items-list').innerHTML = modalHtml;
            } else {
                countLabelTop.classList.add('hidden');
                panel.classList.add('hidden');
                toggleCartModal(true); // Tutup modal kalau kosong
                document.getElementById('cart-items-list').innerHTML = `<p class='text-center text-slate-400 py-10 text-xs'>Keranjang kosong</p>`;
            }
        }

        function toggleCartModal(forceClose = false) {
            const modal = document.getElementById('cart-modal');
            if (forceClose) {
                modal.classList.remove('modal-active');
            } else {
                modal.classList.toggle('modal-active');
            }
        }

        function switchTab(tab) {
            const katalog = document.getElementById('view-katalog');
            const transaksi = document.getElementById('view-transaksi');
            
            // UI Switch
            if(tab === 'katalog') {
                katalog.classList.remove('hidden');
                transaksi.classList.add('hidden');
                updateNavUI('nav-katalog');
            } else {
                katalog.classList.add('hidden');
                transaksi.classList.remove('hidden');
                updateNavUI('nav-transaksi');
            }
        }

        function updateNavUI(activeId) {
            const navIds = ['nav-katalog', 'nav-transaksi', 'nav-user'];
            navIds.forEach(id => {
                const el = document.getElementById(id);
                if(id === activeId) {
                    el.classList.add('bg-emerald-500', 'text-white');
                    el.classList.remove('text-slate-500');
                } else {
                    el.classList.remove('bg-emerald-500', 'text-white');
                    el.classList.add('text-slate-500');
                }
            });
        }

        function kirimWA() {
            let nomorWA = "6281313206521";
            let pesan = "Halo Taufik Pharma,\nSaya mau pesan barang berikut:\n\n";
            let total = 0;

            for (let k in keranjang) {
                let sub = keranjang[k].harga * keranjang[k].qty;
                pesan += `✅ *${k}*\n   Qty: ${keranjang[k].qty} x Rp ${keranjang[k].harga.toLocaleString('id-ID')} = Rp ${sub.toLocaleString('id-ID')}\n\n`;
                total += sub;
            }
            pesan += `*Total Akhir: Rp ${total.toLocaleString('id-ID')}*`;
            window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`, '_blank');
        }

        function cariBarang() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const filter = semuaProduk.filter(p => p.nama_barang.toLowerCase().includes(kw));
            tampilkanData(filter);
        }

        ambilData();
    </script>
</body>
</html>
