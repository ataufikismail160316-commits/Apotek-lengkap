<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grosir Taufik - Partner Apotek Anda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); }
        /* Hilangkan scrollbar tapi tetap bisa scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <header class="glass-header sticky top-0 z-50 border-b border-slate-100 px-4 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-emerald-600 tracking-tight">TAUFIK GROSIR</h1>
                <p class="text-[10px] text-slate-400 font-semibold uppercase tracking-widest">Digital Catalog v1.0</p>
            </div>
            <div class="bg-emerald-50 px-3 py-1 rounded-full flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="text-emerald-700 text-xs font-bold">Stok Update</span>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-24">
        
        <div class="mt-6 space-y-4">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-500 transition-colors"></i>
                <input type="text" id="searchInput" onkeyup="cariBarang()" 
                    placeholder="Cari dari 1.500+ jenis obat..." 
                    class="w-full bg-white border border-slate-200 py-4 pl-12 pr-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 transition-all shadow-sm text-sm">
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                <button onclick="filterKategori('all')" class="bg-emerald-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-lg shadow-emerald-200 whitespace-nowrap">Semua</button>
                <button onclick="filterKategori('Obat Bebas')" class="bg-white border border-slate-200 text-slate-600 px-5 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 whitespace-nowrap">Obat Bebas</button>
                <button onclick="filterKategori('Obat Keras')" class="bg-white border border-slate-200 text-slate-600 px-5 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 whitespace-nowrap">Obat Keras</button>
                <button onclick="filterKategori('Vitamin')" class="bg-white border border-slate-200 text-slate-600 px-5 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 whitespace-nowrap">Vitamin</button>
                <button onclick="filterKategori('Alkes')" class="bg-white border border-slate-200 text-slate-600 px-5 py-2 rounded-xl text-xs font-bold hover:bg-slate-50 whitespace-nowrap">Alkes</button>
            </div>
        </div>

        <div id="produk-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-8">
            <div class="col-span-full text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="mt-4 text-slate-500 font-medium">Sinkronisasi data...</p>
            </div>
        </div>
    </main>

    <a href="https://wa.me/6281234567890" target="_blank" class="fixed bottom-6 right-6 bg-emerald-500 text-white p-4 rounded-2xl shadow-2xl shadow-emerald-400 hover:scale-110 transition-transform active:scale-95 z-50 flex items-center gap-2">
        <i class="fa-brands fa-whatsapp text-2xl"></i>
        <span class="font-bold text-sm pr-2">Order Cepat</span>
    </a>

    <script>
        const URL_PROJECT = 'https://koyrvhtqsqbinagynfyf.supabase.co';
        const KEY_PROJECT = 'sb_publishable_7UyNt1p50WprNz-K-_bFng_cymPxs5M';
        const sbClient = supabase.createClient(URL_PROJECT, KEY_PROJECT);
        
        let semuaProduk = [];

        async function ambilData() {
            const { data, error } = await sbClient
                .from('prodak') 
                .select('*')
                .order('nama_barang', { ascending: true });

            if (error) {
                document.getElementById('produk-list').innerHTML = `<div class="col-span-full text-red-500 text-center">${error.message}</div>`;
                return;
            }
            semuaProduk = data;
            tampilkanData(semuaProduk);
        }

        function tampilkanData(list) {
            let html = '';
            if(list.length === 0) {
                html = `<div class="col-span-full text-center py-20 text-slate-400">Produk tidak ditemukan</div>`;
            } else {
                list.forEach(item => {
                    const pesan = encodeURIComponent(`Halo Taufik Grosir, saya mau pesan:\n\nBarang: ${item.nama_barang}\nKategori: ${item.kategori || 'Umum'}\nHarga: Rp ${Number(item.harga_eceran).toLocaleString('id-ID')}`);
                    
                    html += `
                    <div class="product-card bg-white border border-slate-100 rounded-2xl p-4 flex flex-col justify-between shadow-sm">
                        <div>
                            <span class="text-[9px] font-extrabold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md uppercase">${item.kategori || 'Umum'}</span>
                            <h2 class="mt-2 text-sm font-bold text-slate-800 leading-snug h-10 overflow-hidden">${item.nama_barang}</h2>
                            <p class="mt-3 text-lg font-extrabold text-slate-900 leading-none">
                                <span class="text-[10px] font-medium text-slate-400">Rp</span> 
                                ${Number(item.harga_eceran).toLocaleString('id-ID')}
                            </p>
                            <div class="mt-2 flex items-center gap-1.5">
                                <i class="fa-solid fa-box text-[10px] text-slate-300"></i>
                                <span class="text-[11px] text-slate-500 font-medium">Stok: ${item.stok}</span>
                            </div>
                        </div>
                        <a href="https://wa.me/6281234567890?text=${pesan}" target="_blank" 
                           class="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[11px] font-bold text-center hover:bg-emerald-600 transition-colors flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cart-plus"></i> TAMBAH
                        </a>
                    </div>`;
                });
            }
            document.getElementById('produk-list').innerHTML = html;
        }

        function cariBarang() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const filter = semuaProduk.filter(p => p.nama_barang.toLowerCase().includes(kw));
            tampilkanData(filter);
        }

        function filterKategori(kat) {
            if(kat === 'all') {
                tampilkanData(semuaProduk);
            } else {
                const filter = semuaProduk.filter(p => p.kategori === kat);
                tampilkanData(filter);
            }
        }

        ambilData();
    </script>
</body>
</html>
