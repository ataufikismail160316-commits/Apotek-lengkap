<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taufik Pharma | Katalog Digital Premium</title>
    
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .product-card { border: 1px solid #f1f5f9; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { border-color: #10b981; transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.05); }
        .hero-gradient { background: linear-gradient(135deg, #065f46 0%, #10b981 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900 pb-32">

    <nav class="glass-nav sticky top-0 z-50 px-5 py-4 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                <i class="fa-solid fa-house-medical text-lg"></i>
            </div>
            <div>
                <h1 class="text-base font-extrabold leading-none tracking-tight uppercase">Taufik<span class="text-emerald-600">Pharma</span></h1>
                <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest flex items-center gap-1">
                    <i class="fa-solid fa-circle-check text-emerald-500"></i> Terverifikasi Resmi
                </p>
            </div>
        </div>
        <div class="flex gap-4 text-slate-400">
            <i class="fa-regular fa-bell text-xl"></i>
            <i class="fa-solid fa-cart-shopping text-xl"></i>
        </div>
    </nav>

    <main class="max-w-md mx-auto">
        
        <div class="p-5">
            <div class="relative group">
                <input type="text" id="searchInput" onkeyup="cariBarang()" 
                    placeholder="Cari obat, vitamin, atau alkes..." 
                    class="w-full bg-white border border-slate-200 py-4 pl-12 pr-4 rounded-2xl text-sm focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all outline-none shadow-sm">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-emerald-500 transition-colors"></i>
            </div>
        </div>

        <div class="px-5 mb-6">
            <div class="hero-gradient rounded-3xl p-6 text-white relative overflow-hidden shadow-xl shadow-emerald-100">
                <div class="relative z-10">
                    <span class="bg-white/20 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">Promo Minggu Ini</span>
                    <h2 class="text-xl font-extrabold mt-3 leading-tight">Solusi Kesehatan<br>Terlengkap & Murah</h2>
                    <p class="text-[10px] mt-2 opacity-80 max-w-[180px]">Dapatkan layanan pengantaran cepat ke seluruh area jangkauan kami.</p>
                </div>
                <i class="fa-solid fa-kit-medical absolute -right-6 -bottom-6 text-white/10 text-9xl rotate-12"></i>
            </div>
        </div>

        <div class="px-5 mb-8">
            <div class="grid grid-cols-4 gap-4">
                <div class="flex flex-col items-center gap-2">
                    <div class="h-12 w-12 bg-white rounded-2xl flex items-center justify-center text-emerald-600 shadow-sm border border-slate-100">
                        <i class="fa-solid fa-truck-fast text-lg"></i>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Kirim Cepat</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="h-12 w-12 bg-white rounded-2xl flex items-center justify-center text-blue-600 shadow-sm border border-slate-100">
                        <i class="fa-solid fa-file-prescription text-lg"></i>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Upload Resep</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="h-12 w-12 bg-white rounded-2xl flex items-center justify-center text-orange-600 shadow-sm border border-slate-100">
                        <i class="fa-solid fa-comment-medical text-lg"></i>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Konsultasi</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="h-12 w-12 bg-white rounded-2xl flex items-center justify-center text-rose-600 shadow-sm border border-slate-100">
                        <i class="fa-solid fa-percent text-lg"></i>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">Promo</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-t-[40px] px-5 pt-8 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] min-h-[500px]">
            <div class="flex items-center justify-between mb-6 px-2">
                <h2 class="text-sm font-extrabold text-slate-800 uppercase tracking-tight">Katalog Produk</h2>
                <div class="flex items-center gap-1 text-[10px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    LIVE STOCK
                </div>
            </div>

            <div id="produk-list" class="grid grid-cols-2 gap-4">
                <div class="col-span-2 text-center py-20">
                    <i class="fa-solid fa-circle-notch animate-spin text-3xl text-emerald-500"></i>
                    <p class="text-xs text-slate-400 mt-4 font-bold tracking-widest uppercase">Sinkronisasi Database...</p>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-slate-900/95 backdrop-blur-xl rounded-[2rem] p-2.5 flex items-center justify-around shadow-2xl border border-white/10 z-50">
        <button class="h-11 w-11 rounded-2xl bg-emerald-500 text-white shadow-lg shadow-emerald-500/40 flex items-center justify-center transition-transform active:scale-90">
            <i class="fa-solid fa-house-chimney text-sm"></i>
        </button>
        <button class="h-11 w-11 rounded-2xl text-slate-500 flex items-center justify-center transition-transform active:scale-90">
            <i class="fa-solid fa-clipboard-list text-sm"></i>
        </button>
        <button class="h-11 w-11 rounded-2xl text-slate-500 flex items-center justify-center transition-transform active:scale-90">
            <i class="fa-solid fa-heart-pulse text-sm"></i>
        </button>
        <button class="h-11 w-11 rounded-2xl text-slate-500 flex items-center justify-center transition-transform active:scale-90">
            <i class="fa-solid fa-user-gear text-sm"></i>
        </button>
    </div>

    <script>
        const URL_PROJECT = 'https://koyrvhtqsqbinagynfyf.supabase.co';
        const KEY_PROJECT = 'sb_publishable_7UyNt1p50WprNz-K-_bFng_cymPxs5M';
        const sbClient = supabase.createClient(URL_PROJECT, KEY_PROJECT);
        
        let semuaProduk = [];

        async function ambilData() {
            const { data, error } = await sbClient
                .from('prodak') 
                .select('*')
                .order('nama_barang', { ascending: true });

            if (error) {
                document.getElementById('produk-list').innerHTML = `<p class='col-span-2 text-center text-red-500'>${error.message}</p>`;
                return;
            }
            semuaProduk = data;
            tampilkanData(semuaProduk);
        }

        function tampilkanData(list) {
            let html = '';
            if(list.length === 0) {
                html = `<p class='text-center col-span-2 text-slate-400 py-20 font-bold uppercase tracking-widest text-[10px]'>Produk tidak ditemukan</p>`;
            } else {
                list.forEach(item => {
                    const pesan = encodeURIComponent(`Halo Taufik Pharma,\n\nSaya ingin memesan:\n📦 *${item.nama_barang}*\n💰 Harga: Rp ${Number(item.harga_eceran).toLocaleString('id-ID')}`);
                    
                    html += `
                    <div class="product-card bg-white rounded-3xl overflow-hidden p-4 flex flex-col justify-between shadow-sm">
                        <div>
                            <div class="w-full aspect-square bg-slate-50 rounded-2xl mb-4 flex items-center justify-center text-emerald-600/30">
                                <i class="fa-solid fa-prescription-bottle-medical text-4xl"></i>
                            </div>
                            <h3 class="text-[11px] font-extrabold text-slate-800 leading-snug h-7 overflow-hidden">${item.nama_barang}</h3>
                            <div class="mt-3 flex flex-col">
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Harga Eceran</span>
                                <span class="text-sm font-extrabold text-emerald-700 mt-1">
                                    <span class="text-[9px]">Rp</span> ${Number(item.harga_eceran).toLocaleString('id-ID')}
                                </span>
                            </div>
                        </div>
                        <a href="https://wa.me/6281234567890?text=${pesan}" target="_blank" 
                           class="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[10px] font-bold text-center block shadow-lg hover:bg-emerald-600 transition-all active:scale-95">
                            PESAN
                        </a>
                    </div>`;
                });
            }
            document.getElementById('produk-list').innerHTML = html;
        }

        function cariBarang() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const filter = semuaProduk.filter(p => p.nama_barang.toLowerCase().includes(kw));
            tampilkanData(filter);
        }

        ambilData();
    </script>
</body>
</html>
