<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taufik Pharma | Katalog Digital Premium</title>
    
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .product-card { border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .hero-gradient { background: linear-gradient(135deg, #065f46 0%, #10b981 100%); }
        .cart-badge { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="text-slate-900 pb-40">

    <nav class="glass-nav sticky top-0 z-50 px-5 py-4 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                <i class="fa-solid fa-house-medical text-lg"></i>
            </div>
            <div>
                <h1 class="text-base font-extrabold leading-none tracking-tight uppercase">Taufik<span class="text-emerald-600">Pharma</span></h1>
                <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest flex items-center gap-1">
                    <i class="fa-solid fa-circle-check text-emerald-500"></i> Terverifikasi Resmi
                </p>
            </div>
        </div>
        <div class="relative">
            <i class="fa-solid fa-cart-shopping text-slate-400 text-2xl"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-rose-500 text-white text-[10px] font-bold h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto">
        <div class="p-5">
            <input type="text" id="searchInput" onkeyup="cariBarang()" placeholder="Cari obat atau vitamin..." 
                class="w-full bg-white border border-slate-200 py-4 px-6 rounded-2xl text-sm focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none shadow-sm transition-all">
        </div>

        <div class="bg-white rounded-t-[40px] px-5 pt-8 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] min-h-[500px]">
            <h2 class="text-sm font-extrabold text-slate-800 uppercase tracking-tight mb-6 px-2">Katalog Produk</h2>
            <div id="produk-list" class="grid grid-cols-2 gap-4">
                <div class="col-span-2 text-center py-20"><i class="fa-solid fa-circle-notch animate-spin text-3xl text-emerald-500"></i></div>
            </div>
        </div>
    </main>

    <div id="checkout-panel" class="fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-emerald-600 rounded-2xl p-4 shadow-2xl hidden z-50 transform transition-all">
        <div class="flex justify-between items-center text-white mb-3">
            <div class="flex flex-col">
                <span id="items-info" class="text-[10px] font-bold opacity-80 uppercase">0 Barang terpilih</span>
                <span id="total-price" class="text-lg font-extrabold leading-none">Rp 0</span>
            </div>
            <button onclick="kirimWA()" class="bg-white text-emerald-700 px-4 py-2 rounded-xl text-xs font-bold shadow-sm active:scale-95">
                KIRIM WA <i class="fa-brands fa-whatsapp ml-1"></i>
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-slate-900/95 backdrop-blur-xl rounded-[2rem] p-2.5 flex items-center justify-around shadow-2xl border border-white/10 z-40">
        <button class="h-11 w-11 rounded-2xl bg-emerald-500 text-white flex items-center justify-center"><i class="fa-solid fa-house-chimney text-sm"></i></button>
        <button class="h-11 w-11 rounded-2xl text-slate-500 flex items-center justify-center"><i class="fa-solid fa-clipboard-list text-sm"></i></button>
        <button class="h-11 w-11 rounded-2xl text-slate-500 flex items-center justify-center"><i class="fa-solid fa-user-gear text-sm"></i></button>
    </div>

    <script>
        const URL_PROJECT = 'https://koyrvhtqsqbinagynfyf.supabase.co';
        const KEY_PROJECT = 'sb_publishable_7UyNt1p50WprNz-K-_bFng_cymPxs5M';
        const sbClient = supabase.createClient(URL_PROJECT, KEY_PROJECT);
        
        let semuaProduk = [];
        let keranjang = {}; // Format: { 'ID_Barang': { data: {}, qty: 1 } }

        async function ambilData() {
            const { data, error } = await sbClient.from('prodak').select('*').order('nama_barang', { ascending: true });
            if (error) return;
            semuaProduk = data;
            tampilkanData(semuaProduk);
        }

        function tampilkanData(list) {
            let html = '';
            list.forEach(item => {
                html += `
                <div class="product-card bg-white rounded-3xl p-4 flex flex-col justify-between shadow-sm relative">
                    <div>
                        <div class="w-full aspect-square bg-slate-50 rounded-2xl mb-3 flex items-center justify-center text-emerald-600/20"><i class="fa-solid fa-pills text-4xl"></i></div>
                        <h3 class="text-[11px] font-extrabold text-slate-800 leading-tight h-7 overflow-hidden">${item.nama_barang}</h3>
                        <p class="text-[9px] font-bold text-slate-400 mt-2 uppercase tracking-tighter">Stok: <span class="${item.stok < 10 ? 'text-rose-500' : 'text-emerald-600'}">${item.stok}</span></p>
                        <p class="text-sm font-extrabold text-emerald-700 mt-1">Rp ${Number(item.harga_eceran).toLocaleString('id-ID')}</p>
                    </div>
                    <button onclick="tambahKeKeranjang('${item.nama_barang}', ${item.harga_eceran})" 
                        class="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-xl text-[10px] font-bold hover:bg-emerald-600 transition-all active:scale-90">
                        + KERANJANG
                    </button>
                </div>`;
            });
            document.getElementById('produk-list').innerHTML = html;
        }

        function tambahKeKeranjang(nama, harga) {
            if (keranjang[nama]) {
                keranjang[nama].qty += 1;
            } else {
                keranjang[nama] = { harga: harga, qty: 1 };
            }
            updateCartUI();
        }

        function updateCartUI() {
            let totalItems = 0;
            let totalPrice = 0;
            for (let k in keranjang) {
                totalItems += keranjang[k].qty;
                totalPrice += (keranjang[k].harga * keranjang[k].qty);
            }

            const countLabel = document.getElementById('cart-count');
            const panel = document.getElementById('checkout-panel');
            
            if (totalItems > 0) {
                countLabel.innerText = totalItems;
                countLabel.classList.remove('hidden');
                countLabel.classList.add('cart-badge');
                panel.classList.remove('hidden');
                document.getElementById('items-info').innerText = `${totalItems} Barang Terpilih`;
                document.getElementById('total-price').innerText = `Rp ${totalPrice.toLocaleString('id-ID')}`;
            }
        }

        function kirimWA() {
            let nomorWA = "6281313206521";
            let pesan = "Halo Taufik Pharma,\nSaya ingin memesan produk berikut:\n\n";
            let totalSemua = 0;

            for (let k in keranjang) {
                let subTotal = keranjang[k].harga * keranjang[k].qty;
                pesan += `✅ *${k}*\n   ${keranjang[k].qty} pcs x Rp ${keranjang[k].harga.toLocaleString('id-ID')} = Rp ${subTotal.toLocaleString('id-ID')}\n\n`;
                totalSemua += subTotal;
            }

            pesan += `*Total Pembayaran: Rp ${totalSemua.toLocaleString('id-ID')}*\n\nMohon segera diproses ya. Terima kasih!`;
            window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`, '_blank');
        }

        function cariBarang() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const filter = semuaProduk.filter(p => p.nama_barang.toLowerCase().includes(kw));
            tampilkanData(filter);
        }

        ambilData();
    </script>
</body>
</html>
