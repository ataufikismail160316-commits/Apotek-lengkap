<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taufik Pharma - Katalog Digital Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .search-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .product-card { border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .product-card:hover { border-color: #10b981; transform: translateY(-2px); }
    </style>
</head>
<body class="text-slate-900">

    <nav class="glass-nav sticky top-0 z-50 px-5 py-4 flex items-center justify-between border-b border-slate-100">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                <i class="fa-solid fa-house-medical text-lg"></i>
            </div>
            <div>
                <h1 class="text-base font-extrabold leading-none tracking-tight">TAUFIK<span class="text-emerald-600">PHARMA</span></h1>
                <p class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest flex items-center gap-1">
                    <i class="fa-solid fa-circle-check text-emerald-500"></i> Terverifikasi
                </p>
            </div>
        </div>
        <div class="relative">
            <i class="fa-solid fa-cart-shopping text-slate-400 text-xl"></i>
            <span class="absolute -top-2 -right-2 bg-rose-500 text-white text-[8px] font-bold h-4 w-4 rounded-full flex items-center justify-center">0</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto">
        
        <div class="p-5">
            <div class="relative group">
                <input type="text" id="searchInput" onkeyup="cariBarang()" 
                    placeholder="Cari obat atau kebutuhan medis..." 
                    class="w-full bg-white border border-slate-100 py-4 pl-12 pr-4 rounded-2xl text-sm search-shadow focus:ring-2 focus:ring-emerald-500/10 focus:border-emerald-500 transition-all outline-none">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-emerald-500 transition-colors"></i>
            </div>
        </div>

        <div class="px-5 mb-8">
            <div class="grid grid-cols-4 gap-4">
                <div class="flex flex-col items-center gap-2">
                    <div class="h-12 w-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-600 border border-emerald-100/50">
                        <i class="fa-solid fa-truck-fast text-xl"></i>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 text-center uppercase">Delivery</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="h-12 w-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 border border-blue-100/50">
                        <i class="fa-solid fa-notes-medical text-xl"></i>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 text-center uppercase">Resep</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="h-12 w-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-600 border border-orange-100/50">
                        <i class="fa-solid fa-comment-dots text-xl"></i>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 text-center uppercase">Konsultasi</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="h-12 w-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-600 border border-slate-100/50">
                        <i class="fa-solid fa-ellipsis text-xl"></i>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 text-center uppercase">Lainnya</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-t-[40px] px-5 pt-8 pb-24 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.05)] min-h-[500px]">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-sm font-extrabold text-slate-800 uppercase tracking-tight">Katalog Produk</h2>
                <div class="text-[10px] font-bold text-emerald-600 flex items-center gap-1">
                    Urutkan <i class="fa-solid fa-chevron-down text-[8px]"></i>
                </div>
            </div>

            <div id="produk-list" class="grid grid-cols-2 gap-4">
                <div class="col-span-2 text-center py-20">
                    <i class="fa-solid fa-circle-notch animate-spin text-3xl text-emerald-500"></i>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-xs bg-slate-900/90 backdrop-blur-lg rounded-3xl p-2 flex items-center justify-around shadow-2xl border border-white/10 z-50">
        <button class="h-10 w-10 rounded-2xl bg-emerald-500 text-white shadow-lg shadow-emerald-500/30 flex items-center justify-center">
            <i class="fa-solid fa-house text-sm"></i>
        </button>
        <button class="h-10 w-10 rounded-2xl text-slate-400 flex items-center justify-center">
            <i class="fa-solid fa-box-archive text-sm"></i>
        </button>
        <button class="h-10 w-10 rounded-2xl text-slate-400 flex items-center justify-center">
            <i class="fa-solid fa-clock-rotate-left text-sm"></i>
        </button>
        <button class="h-10 w-10 rounded-2xl text-slate-400 flex items-center justify-center">
            <i class="fa-solid fa-user-large text-sm"></i>
        </button>
    </div>

    <script>
        const URL_PROJECT = 'https://koyrvhtqsqbinagynfyf.supabase.co';
        const KEY_PROJECT = 'sb_publishable_7UyNt1p50WprNz-K-_bFng_cymPxs5M';
        const sbClient = supabase.createClient(URL_PROJECT, KEY_PROJECT);
        
        let semuaProduk = [];

        async function ambilData() {
            const { data, error } = await sbClient
                .from('prodak') 
                .select('*')
                .order('nama_barang', { ascending: true });

            if (error) {
                document.getElementById('produk-list').innerHTML = `<p class='text-center col-span-2 text-red-500'>${error.message}</p>`;
                return;
            }
            semuaProduk = data;
            tampilkanData(semuaProduk);
        }

        function tampilkanData(list) {
            let html = '';
            if(list.length === 0) {
                html = `<p class='text-center col-span-2 text-slate-300 py-10 font-medium'>Produk tidak tersedia</p>`;
            } else {
                list.forEach(item => {
                    const pesan = encodeURIComponent(`Halo Taufik Pharma, saya ingin pesan:\n\nProduk: ${item.nama_barang}\nHarga: Rp ${Number(item.harga_eceran).toLocaleString('id-ID')}`);
                    
                    html += `
                    <div class="product-card bg-white rounded-2xl overflow-hidden p-3 flex flex-col justify-between">
                        <div>
                            <div class="w-full aspect-[4/3] bg-slate-50 rounded-xl mb-3 flex items-center justify-center text-slate-200">
                                <i class="fa-solid fa-pills text-3xl"></i>
                            </div>
                            <h3 class="text-[11px] font-bold text-slate-800 leading-snug h-7 overflow-hidden">${item.nama_barang}</h3>
                            <div class="mt-2 flex items-baseline gap-1">
                                <span class="text-[10px] font-medium text-slate-400">Rp</span>
                                <span class="text-sm font-extrabold text-slate-900">${Number(item.harga_eceran).toLocaleString('id-ID')}</span>
                            </div>
                        </div>
                        <a href="https://wa.me/6281234567890?text=${pesan}" target="_blank" 
                           class="mt-3 w-full bg-emerald-600 text-white py-2 rounded-xl text-[10px] font-bold text-center block shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all">
                            PESAN
                        </a>
                    </div>`;
                });
            }
            document.getElementById('produk-list').innerHTML = html;
        }

        function cariBarang() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const filter = semuaProduk.filter(p => p.nama_barang.toLowerCase().includes(kw));
            tampilkanData(filter);
        }

        ambilData();
    </script>
</body>
</html>
